name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Update Site Data
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: react-next/package-lock.json

      - name: Install React app dependencies
        run: npm ci --no-audit --no-fund
        working-directory: react-next

      - name: Build React root + preview artifacts
        env:
          VITE_GIT_SHA: ${{ github.sha }}
        run: python3 scripts/build_react_artifacts.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify React preview artifact paths
        run: python3 scripts/verify_next_preview_artifact.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
