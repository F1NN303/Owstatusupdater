name: Send Test Email Alert

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-test-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.site.txt

      - name: Refresh latest status data
        run: python scripts/build_site_data.py

      - name: Send forced test email via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_SENDER_NAME: Overwatch Service Radar Test
          ALERT_SITE_URL: https://f1nn303.github.io/Owstatusupdater/
          ALERT_FORCE_SEND: "1"
        run: python scripts/send_brevo_major_alert.py

      - name: Commit and push data/state updates if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- site/data/status.json site/data/history.json site/data/summary.json site/data/rss.xml site/data/alerts.json site/data/state.json site/data/email_alert_state.json; then
            echo "No data changes."
            exit 0
          fi
          git add site/data/status.json site/data/history.json site/data/summary.json site/data/rss.xml site/data/alerts.json site/data/state.json site/data/email_alert_state.json
          git commit -m "chore: refresh status data and test email state"
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push failed on attempt $attempt. Rebasing and retrying..."
            git pull --rebase origin main || {
              echo "Rebase failed, aborting."
              git rebase --abort || true
              exit 1
            }
            attempt=$((attempt + 1))
          done
          echo "Push failed after $max_attempts attempts."
          exit 1
