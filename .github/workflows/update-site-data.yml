name: Update Site Data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore private bot state cache
        id: bot_state_restore
        uses: actions/cache/restore@v4
        with:
          path: .bot_state
          key: bot-state-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            bot-state-${{ runner.os }}-${{ github.ref_name }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.site.txt

      - name: Validate service configs
        run: python scripts/validate_services.py

      - name: Build status JSON
        env:
          M365_GRAPH_TENANT_ID: ${{ secrets.M365_GRAPH_TENANT_ID }}
          M365_GRAPH_CLIENT_ID: ${{ secrets.M365_GRAPH_CLIENT_ID }}
          M365_GRAPH_CLIENT_SECRET: ${{ secrets.M365_GRAPH_CLIENT_SECRET }}
        run: python scripts/build_site_data.py --service all

      - name: Send major outage email via Brevo
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_SENDER_NAME: Overwatch Service Radar
          ALERT_MAJOR_COOLDOWN_MINUTES: "360"
          ALERT_SITE_URL: https://f1nn303.github.io/Owstatusupdater/
        run: python scripts/send_brevo_major_alert.py

      - name: Validate public artifact exposure rules
        run: python scripts/check_public_exposure.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python scripts/list_service_data_paths.py | xargs -r git add -f --
          if git diff --cached --quiet; then
            echo "No status data changes."
            exit 0
          fi
          git commit -m "chore: refresh status data"
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push failed on attempt $attempt. Rebasing and retrying..."
            git pull --rebase origin main || {
              echo "Rebase failed, aborting."
              git rebase --abort || true
              exit 1
            }
            attempt=$((attempt + 1))
          done
          echo "Push failed after $max_attempts attempts."
          exit 1

      - name: Save private bot state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .bot_state
          key: ${{ steps.bot_state_restore.outputs.cache-primary-key }}
