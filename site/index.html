<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting to Status Home</title>
  <meta http-equiv="refresh" content="0; url=./next/">
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #020617;
      --bg-1: #081427;
      --panel: rgba(15, 23, 42, 0.72);
      --border: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(80rem 40rem at -10% -10%, rgba(56, 189, 248, 0.14), transparent 60%),
        radial-gradient(70rem 35rem at 110% 10%, rgba(59, 130, 246, 0.12), transparent 58%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 1rem;
    }
    .panel {
      width: min(36rem, 100%);
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      padding: 1rem 1rem 0.9rem;
    }
    h1 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.2;
    }
    p {
      margin: 0.5rem 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.92rem;
    }
    .links {
      margin-top: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }
    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 999px;
      padding: 0.42rem 0.7rem;
      font-size: 0.82rem;
    }
    a.primary {
      border-color: rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.12);
      color: #bfefff;
    }
  </style>
</head>
<body>
  <main class="panel" aria-live="polite">
    <h1>Opening the new React status home...</h1>
    <p>
      The default entry page now redirects to the new preview app shell. If it does not open
      automatically, use one of the links below.
    </p>
    <div class="links">
      <a class="primary" href="./next/">Open New Home</a>
      <a href="./legacy-home.html">Open Legacy Home</a>
      <a href="./overwatch.html">Legacy Overwatch</a>
      <a href="./sony/index.html">Legacy Sony PSN</a>
      <a href="./email-alerts.html">Legacy E-Mail Alerts</a>
    </div>
  </main>
  <script>
    (function () {
      var target = new URL("./next/", window.location.href);
      if (window.location.search) target.search = window.location.search;
      if (window.location.hash) target.hash = window.location.hash;
      window.location.replace(target.toString());
    })();
  </script>
</body>
</html>
