<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Status Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-version-url="./data/status.json">
  <main class="page home-page">
    <nav class="top-nav" aria-label="Site navigation">
      <span class="brand-link brand-static" aria-label="Status Home">
        <img class="brand-logo-image" src="./vendor/logo-overwatch.svg" alt="" aria-hidden="true">
        <span>Status Home</span>
      </span>
      <div class="top-actions top-actions-links" aria-label="Quick links">
        <a class="top-link" href="./overwatch.html">Overwatch</a>
        <a class="top-link" href="./sony/index.html">Sony PSN</a>
        <a class="top-link" href="./email-alerts.html">E-Mail Alerts</a>
        <a class="top-link" href="https://github.com/F1NN303/Owstatusupdater" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </nav>

    <section class="hero reveal home-hero">
      <div class="hero-main">
        <p class="eyebrow">Service Directory</p>
        <h1>All Services</h1>
        <p class="headline">Status overview for all monitored services. Tap an item to open full live details.</p>
      </div>
    </section>

    <section class="card reveal home-services-card">
      <h2>Service Status</h2>
      <p class="summary">Status color: green stable, yellow warning, red outage.</p>
      <ul id="homeServiceList" class="home-service-list" aria-live="polite"></ul>
    </section>
  </main>

  <nav id="mobileDock" class="mobile-dock" aria-label="Quick navigation">
    <span id="mobileDockIndicator" class="mobile-dock-indicator" aria-hidden="true"></span>
    <a id="dockHomeLink" class="mobile-dock-link mobile-dock-link--home" href="./index.html" aria-current="page">
      <span class="mobile-dock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M4 10.5L12 4l8 6.5"></path>
          <path d="M6.5 9.5V20h11V9.5"></path>
          <path d="M10 20v-5h4v5"></path>
        </svg>
      </span>
      <span class="mobile-dock-label" data-link-label>Home</span>
    </a>
    <a id="dockOverwatchLink" class="mobile-dock-link mobile-dock-link--overwatch" href="./overwatch.html">
      <span class="mobile-dock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="6.5"></circle>
          <path d="M12 3v3"></path>
          <path d="M12 18v3"></path>
          <path d="M3 12h3"></path>
          <path d="M18 12h3"></path>
          <circle class="dock-icon-fill" cx="12" cy="12" r="1.45"></circle>
        </svg>
      </span>
      <span class="mobile-dock-label" data-link-label>OW</span>
    </a>
    <a id="dockSonyLink" class="mobile-dock-link mobile-dock-link--sony" href="./sony/index.html">
      <span class="mobile-dock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7.6 9.5h8.8c1.96 0 3.6 1.49 3.6 3.38 0 1.24-.36 2.43-1 3.47-.42.7-1.4.84-2.02.27l-1.84-1.62H8.88L7.04 16.62c-.63.57-1.6.43-2.02-.27-.64-1.04-1-2.23-1-3.47 0-1.89 1.64-3.38 3.58-3.38Z"></path>
          <path d="M8.2 12.25h2.9"></path>
          <path d="M9.65 10.8v2.9"></path>
          <path d="M15.95 11.9h.1"></path>
          <path d="M17.75 13.1h.1"></path>
        </svg>
      </span>
      <span class="mobile-dock-label" data-link-label>PSN</span>
    </a>
    <a id="dockEmailAlertsLink" class="mobile-dock-link mobile-dock-link--mail" href="./email-alerts.html">
      <span class="mobile-dock-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="4" y="6.5" width="16" height="11" rx="2.4"></rect>
          <path d="M5.4 8l6.6 5 6.6-5"></path>
        </svg>
      </span>
      <span class="mobile-dock-label" data-link-label>Mail</span>
    </a>
  </nav>

  <footer class="page-version" data-version-info>Version: loading...</footer>

  <script src="./version-info.js" defer></script>
  <script src="./mobile-dock.js" defer></script>
  <script src="./home.js" defer></script>
  <script src="./liquid-glass-engine.js" defer></script>
</body>
</html>
