<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Overwatch Status</title>
  <meta http-equiv="refresh" content="0; url=./#/status/overwatch">
  <style>
    :root {
      color-scheme: dark;
      --bg-0: #020617;
      --bg-1: #081427;
      --panel: rgba(15, 23, 42, 0.72);
      --border: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(70rem 36rem at -10% -10%, rgba(56, 189, 248, 0.14), transparent 60%),
        radial-gradient(70rem 36rem at 110% 10%, rgba(59, 130, 246, 0.12), transparent 58%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
    }
    .panel {
      width: min(36rem, 100%);
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      padding: 1rem 1rem 0.9rem;
    }
    h1 { margin: 0; font-size: 1.1rem; }
    p { margin: 0.5rem 0 0; color: var(--muted); line-height: 1.45; font-size: 0.92rem; }
    .links { margin-top: 0.85rem; display: flex; flex-wrap: wrap; gap: 0.55rem; }
    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 999px;
      padding: 0.42rem 0.7rem;
      font-size: 0.82rem;
    }
    a.primary {
      border-color: rgba(56, 189, 248, 0.35);
      background: rgba(56, 189, 248, 0.12);
      color: #bfefff;
    }
  </style>
</head>
<body>
  <main class="panel" aria-live="polite">
    <h1>Opening the React Overwatch status page...</h1>
    <p>
      The Overwatch entry page now routes to the React status detail view. Use the links below if
      automatic redirect does not complete.
    </p>
    <div class="links">
      <a class="primary" href="./#/status/overwatch">Open React Overwatch</a>
      <a href="./legacy-overwatch.html">Open Legacy Overwatch</a>
      <a href="./">Open React Home</a>
      <a href="./legacy-home.html">Open Legacy Home</a>
    </div>
  </main>
  <script>
    (function () {
      var target = new URL("./", window.location.href);
      target.hash = "/status/overwatch";
      window.location.replace(target.toString());
    })();
  </script>
</body>
</html>
